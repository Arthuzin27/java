<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Email">

        <div class="password-container">
            <input type="password" id="senha" placeholder="Senha">
            <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <button id="btnLogin">Entrar</button>

        <div class="msg" id="msg"></div>

        <div class="actions">
            <button class="btn-secondary" onclick="window.location.href='registro.html'">Registrar</button>
            <button class="btn-link" onclick="window.location.href='recuperarSenha.html'">Esqueci a senha</button>
        </div>
    </div>

    <!-- CARREGA O JS -->
    <script src="js/login.js"></script>
</body>

</html>
