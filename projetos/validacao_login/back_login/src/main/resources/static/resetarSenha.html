<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="css/resetarSenha.css">
</head>
<body>
    <div class="container">
        <h2>Redefinir Senha</h2>

        <input type="text" id="codigo" placeholder="Código enviado por email">
        <input type="password" id="novaSenha" placeholder="Nova senha">
        <button id="btnResetar">Redefinir</button>

        <div class="msg" id="mensagem"></div>

        <div class="actions">
            <button class="btn-secondary" onclick="window.location.href='login.html'">Voltar</button>
        </div>
    </div>

    <script src="js/resetarSenha.js"></script>
</body>
</html>
