<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="actions">
        <button class="btn-secondary" onclick="window.location.href='registro.html'">
            Criar conta
        </button>

        <button class="btn-link" onclick="window.location.href='recuperarSenha.html'">
            Esqueci a senha
        </button>
    </div>

    <p class="msg" id="msg"></p>
</div>

<script src="app.js"></script>
</body>
</html>
